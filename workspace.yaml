workspace_name: "movilizer_movie_workspace"
output_root: "outputs"
shared_prompt_library: "shared/prompt_library.yaml"
shared_asset_packs:
  - "shared/asset_packs.yaml"

global_defaults:
  seed: 42
  run_settings:
    batch_size: 1
    resume: true
  model:
    base_id: "stabilityai/stable-diffusion-xl-base-1.0"
    refiner_id: "stabilityai/stable-diffusion-xl-refiner-1.0"
    fast_base_id: "your-org/fast-sdxl-placeholder"
    use_refiner: false
    precision: "bf16"
    enable_xformers: true
    attention_slicing: true

global_guidelines:
  prompt: "feature film visual language, coherent anatomy, realistic texture, character continuity"
  negative_prompt: "distorted face, low quality, duplicated limbs, frame tearing"

model_registry:
  cache_root: "models/cache"
  auto_pull: false

prompt_media:
  images:
    - "shared/global_refs/global_color_bible.txt"
  videos:
    - "shared/global_refs/global_motion_bible.txt"

projects:
  - name: "feature_film_demo"
    path: "projects/feature_film_demo/project.yaml"
  - name: "my_makeover"
    path: "projects/my_makeover/project.yaml"

selection:
  default_projects: ["feature_film_demo"]
  default_scenes: ["scene_001_opening", "scene_002_dialog"]

identity_folders:
  - "data/identities/lead_actor"
  - "data/my_identity"

asset_folders:
  - "projects/feature_film_demo/assets"
  - "projects/my_makeover/assets"
