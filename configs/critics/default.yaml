# Default configuration for the multi-agent critique system

# Ensemble configuration
ensemble:
  # Which critics to run
  critics:
    - story
    - visual
    - technical
    - director
    - audience
    - continuity

  # Critique level: shot, scene, or movie
  level: shot

  # Run critics in parallel for speed
  parallel: true

  # Use mock LLM for testing (no actual model required)
  use_mock_llm: false

  # Default LLM model to use
  default_model: mistral-7b

# Producer decision configuration
producer:
  # Score thresholds
  approval_threshold: 7.0
  critical_threshold: 4.0
  revision_threshold: 7.0

  # Maximum revision cycles before forcing approval
  max_revisions: 3

  # Critic-specific weights (1.0 = equal weight)
  critic_weights:
    story: 1.2        # Story is important
    visual: 1.1       # Visual quality matters
    technical: 1.0    # Technical is baseline
    director: 1.0     # Directorial choices
    audience: 1.1     # Audience appeal
    continuity: 1.0   # Continuity within scene

  # Critics that must all score >= approval_threshold
  required_critics: []

  # Critics that can veto if below threshold
  veto_critics:
    technical: 3.0    # Technical failures are deal-breakers

  # Genre-specific weights
  genre_weights:
    action:
      visual: 1.3
      technical: 1.1
      audience: 1.2
    drama:
      story: 1.4
      audience: 1.2
    horror:
      visual: 1.3
      audience: 1.3
    comedy:
      story: 1.3
      audience: 1.4

# LLM pool configuration
llm_pool:
  # Models to pre-load on startup
  preload_models: []

  # Backend preferences
  preferred_backend: vllm  # or transformers

  # vLLM specific settings
  vllm:
    gpu_memory_utilization: 0.8
    tensor_parallel_size: 1

  # Transformers specific settings
  transformers:
    device: cuda
    dtype: auto

# Critic-specific configurations
critics:
  story:
    # Model to use for story critique
    model: mistral-7b
    # Temperature for LLM (lower = more consistent)
    temperature: 0.5

  visual:
    model: llava-1.5
    temperature: 0.5
    # Use image analysis fallback if LLM unavailable
    use_heuristic_fallback: true

  continuity:
    model: llava-1.5
    temperature: 0.5
    # Use pixel comparison fallback
    use_pixel_fallback: true

  audience:
    model: mistral-7b
    temperature: 0.7  # Higher for varied perspectives
    # Which personas to use
    personas:
      - general
      - critic
      - genre_fan
      - casual

  technical:
    # Minimum acceptable resolution
    min_resolution: [1280, 720]
    # Check audio quality
    check_audio: true

  director:
    model: llava-1.5
    temperature: 0.5
    # Use heuristic composition analysis
    use_heuristic_fallback: true
